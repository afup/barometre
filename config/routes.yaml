afup_barometre_homepage:
  path: /
  methods: GET
  controller: Symfony\Bundle\FrameworkBundle\Controller\RedirectController
  defaults:
    path: /campaign/2026
    permanent: false

afup_barometre_form:
  path: /campaign/2026
  methods: GET
  controller: App\Controller\CampaignController::formAction

controllers:
  resource:
    path: ../src/Controller/
    namespace: App\Controller
  type: attribute
